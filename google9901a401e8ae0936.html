<script id="mobile-header-fix">
(function() {
  const tools = document.querySelector('.nav-tools');
  if (!tools) return;
  const trigger = tools.querySelector('a');
  let open = false;

  trigger.addEventListener('click', function(e) {
    if (window.innerWidth <= 768) {
      e.preventDefault();
      open = !open;
      tools.classList.toggle('open', open);
    }
  });

  document.addEventListener('click', function(e) {
    if (window.innerWidth <= 768 && open && !tools.contains(e.target)) {
      tools.classList.remove('open');
      open = false;
    }
  });

  window.addEventListener('resize', function() {
    if (window.innerWidth > 768) {
      tools.classList.remove('open');
      open = false;
    }
  });
})();
</script>

<script id="mobile-header-fix-v25">
(function() {
  const tools = document.querySelector('.nav-tools');
  if (!tools) return;

  const trigger = tools.querySelector(':scope > a');
  const dropdown = tools.querySelector(':scope > ul');
  if (!trigger || !dropdown) return;

  let open = false;
  let clone = null;

  // 🖥 Desktop hover - unchanged
  tools.addEventListener('mouseenter', () => {
    if (window.innerWidth > 768) dropdown.style.display = 'block';
  });
  tools.addEventListener('mouseleave', () => {
    if (window.innerWidth > 768) dropdown.style.display = 'none';
  });

    if (window.innerWidth > 768) return;
    e.preventDefault();

    if (!open) {
      const rect = trigger.getBoundingClientRect();

      // Clone dropdown
      clone = dropdown.cloneNode(true);
      clone.style.position = 'absolute';
      clone.style.top = window.scrollY + rect.bottom + 6 + 'px';
      clone.style.left = window.scrollX + rect.left + 'px';
      clone.style.minWidth = rect.width + 'px';
      clone.style.display = 'block';
      clone.style.zIndex = '10000';
      clone.style.background = '#fff';
      clone.style.border = '1px solid #e2e8f0';

      });

      document.body.appendChild(clone);
      open = true;
    } else {
      if (clone) clone.remove();
      open = false;
    }
  });

  // 🖱 Close when tapping outside
  document.addEventListener('click', (e) => {

})();

<script id="lang-switcher-js">
(function(){
  var TRANSLATED = ['', 'dns-lookup', 'whois-lookup', 'ip-blacklist', 'asn-lookup', 'internet-speed-test', 'generate-password', 'ip-subnet-calculator', 'cidr-to-ip-range-calculator', 'ip-range-to-cidr-calculator', 'hide-my-ip', 'router/10.0.0.1', 'router/10.11.12.1', 'router/192.168.0.100', 'router/192.168.0.254', 'router/192.168.100.1', 'router/192.168.10.1', 'router/192.168.11.1', 'router/192.168.1.11', 'router/192.168.12.1', 'router/192.168.1.250', 'router/192.168.1.2', 'router/192.168.1.254', 'router/192.168.188.1', 'router/192.168.2.1', 'router/192.168.223.1', 'router/192.168.254.254', 'router/192.168.4.1', 'router/192.168.7.1', 'router/192.168.8.1', 'router/192.168.1.1', 'router/192.168.0.1'];
  var LANGS = [
    {code:'en', flag:'EN', label:'English', base:'https://myipnow.net/'},
    {code:'de', flag:'DE', label:'Deutsch', base:'https://myipnow.net/de/'},
    {code:'es', flag:'ES', label:'Espanol', base:'https://myipnow.net/es/'},
    {code:'fr', flag:'FR', label:'Francais', base:'https://myipnow.net/fr/'},
    {code:'it', flag:'IT', label:'Italiano', base:'https://myipnow.net/it/'}
  ];
  function getSlug(){
    var path = location.pathname;
    path = path.replace(/^\//, '').replace(/\/$/, '');
    var parts = path.split('/');
    if(['de','es','fr','it'].indexOf(parts[0]) !== -1) parts.shift();
    return parts.join('/');
  }
  function isTranslated(slug){ return TRANSLATED.indexOf(slug) !== -1; }
  function getCurrentLang(){
    var parts = location.pathname.replace(/^\//, '').split('/');
    if(['de','es','fr','it'].indexOf(parts[0]) !== -1) return parts[0];
    return 'en';
  }
  function init(){
    var slug = getSlug();
    if(!isTranslated(slug)) return;
    var nav = document.querySelector('.category-nav ul');
    if(!nav) return;
    var currentLang = getCurrentLang();
    var li = document.createElement('li');
    li.className = 'lang-switcher';
    var btn = document.createElement('button');
    btn.className = 'lang-switcher-btn';
    var currentL = LANGS.find(function(l){return l.code===currentLang;}) || LANGS[0];
    btn.textContent = currentL.code.toUpperCase() + ' \u25bc';
    li.appendChild(btn);
    nav.appendChild(li);
    var floatingMenu = null, backdrop = null, open = false;
    function buildMenu(){
      var ul = document.createElement('ul');
      Object.assign(ul.style, {
        position:'fixed', zIndex:'99999', background:'#fff',
        border:'1px solid #e2e8f0', borderRadius:'10px',
        boxShadow:'0 10px 30px rgba(0,0,0,0.15)',
        listStyle:'none', padding:'0.4rem 0', margin:'0',
        minWidth:'160px', display:'block'
      });
      LANGS.forEach(function(lang){
        var item = document.createElement('li');
        var a = document.createElement('a');
        a.href = lang.base + (slug ? slug + '/' : '');
        a.textContent = lang.label;
        Object.assign(a.style, {
          display:'block', padding:'0.55rem 1rem',
          textDecoration:'none', color:'#1e293b',
          fontSize:'0.95rem', fontWeight:'500'
        });
        if(lang.code === currentLang){ a.style.fontWeight='700'; a.style.color='#4f46e5'; }
        a.onmouseenter = function(){ a.style.background='#f1f5f9'; };
        a.onmouseleave = function(){ a.style.background=''; };
        item.appendChild(a);
        ul.appendChild(item);
      });
      return ul;
    }
    function positionMenu(){
      if(!floatingMenu) return;
      var rect = btn.getBoundingClientRect();
      var left = rect.left;
      if(left + 170 > window.innerWidth - 10) left = window.innerWidth - 175;
      floatingMenu.style.top = (rect.bottom + 6) + 'px';
      floatingMenu.style.left = left + 'px';
    }
    function closeMenu(){
      if(floatingMenu){ floatingMenu.remove(); floatingMenu = null; }
      if(backdrop){ backdrop.remove(); backdrop = null; }
      open = false;
    }
    function openMenu(){
      if(open){ closeMenu(); return; }
      backdrop = document.createElement('div');
      Object.assign(backdrop.style, {
        position:'fixed', top:'0', left:'0',
        width:'100vw', height:'100vh',
        zIndex:'99998', background:'transparent'
      });
      backdrop.addEventListener('click', closeMenu);
      document.body.appendChild(backdrop);
      floatingMenu = buildMenu();
      document.body.appendChild(floatingMenu);
      positionMenu();
      open = true;
    }
    btn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); openMenu(); });
    btn.addEventListener('touchstart', function(e){ e.preventDefault(); e.stopPropagation(); openMenu(); }, {passive:false});
    window.addEventListener('resize', closeMenu);
    window.addEventListener('scroll', function(){ if(open) positionMenu(); });
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else { init(); }
})();

</script>
